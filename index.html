<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goban-web demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2rem;
        background: #2b2b2b;
        color: #eee;
        font-family: system-ui, sans-serif;
        box-sizing: border-box;
      }
      main {
        width: min(640px, 90vw);
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      go-board {
        border-radius: 4px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      #status {
        display: flex;
        justify-content: space-between;
        font-variant-numeric: tabular-nums;
      }
      button {
        cursor: pointer;
        padding: 0.5rem 1rem;
      }
      #controls {
        display: flex;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>goban-web</h1>
      <div id="status">
        <span id="turn">Black to move</span>
        <span id="captures">Captures — B: 0, W: 0</span>
      </div>
      <go-board size="9"></go-board>
      <div id="controls">
        <button id="pass">Pass</button>
        <button id="reset">Reset</button>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
