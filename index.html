<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goban-web demo</title>
    <style>
      /*
       * LaTeX's Latin Modern Roman, self-hosted (not a system/local()
       * lookup) so it renders the same for every visitor regardless of
       * whether they have a TeX distribution installed. Files are a
       * repackaging of the GUST Font License-covered Latin Modern Roman
       * webfont kit (see public/assets/fonts/LICENSE.md for provenance
       * and license text) — free to use, modify, and redistribute.
       */
      @font-face {
        font-family: "Latin Modern Roman";
        src: url("/assets/fonts/lmroman-regular-webfont.woff") format("woff");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Latin Modern Roman";
        src: url("/assets/fonts/lmroman-bold-webfont.woff") format("woff");
        font-weight: bold;
        font-style: normal;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2rem;
        background: #2b2b2b;
        color: #eee;
        font-family: system-ui, sans-serif;
        box-sizing: border-box;
      }
      @media (prefers-color-scheme: light) {
        body {
          background: #fafafa;
          color: #1a1a1a;
        }
      }
      /*
       * Manual theme override for the *page's own* chrome (body
       * background/text) — separate from goban-web's components, which
       * take their own `color-scheme` directly as a `<goban-wrapper>`
       * attribute now (see "Theming" in Docs.md), not through this global
       * CSS. No `data-theme` attribute (the default) means "follow the
       * OS", same as before.
       */
      :root[data-theme="dark"] body {
        background: #2b2b2b;
        color: #eee;
      }
      :root[data-theme="light"] body {
        background: #fafafa;
        color: #1a1a1a;
      }
      main {
        /* No explicit width: shrinks to fit its widest child, which is
         * go-board-container — itself sized by <go-board>'s own `width`
         * attribute (see the size slider below). This keeps .title-row
         * (100% of main) exactly as wide as the board, instead of an
         * arbitrary cap. */
        max-width: 90vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      /*
       * <go-board>'s own `width` attribute (driven by the slider below)
       * is a fixed length, not a percentage — on its own that would
       * overflow a narrow viewport once the slider's set past however
       * much room is actually available. `max-width: 100%` on both it
       * and go-board-container (which otherwise has no width of its own,
       * just shrink-wrapping go-board's) is what actually makes "the
       * container and everything inside it" responsive: it caps both at
       * whatever `main`'s own 90vw allows, so the slider gives an upper
       * bound, not a fixed size the layout has to honor unconditionally.
       * go-metadata-container/go-board-controls need no such rule of
       * their own — they already stretch to match go-board-container's
       * width via its default flex `align-items: stretch`.
       */
      go-board-container,
      go-board {
        max-width: 100%;
      }
      .title-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .title-row h1 {
        margin: 0;
      }
      .size-row {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.9rem;
      }
      .size-row input[type="range"] {
        flex: 1;
        accent-color: currentColor;
      }
      .size-row output {
        flex: none;
        min-width: 3.5rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
        opacity: 0.8;
      }
      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: none;
        width: 2.5rem;
        height: 2.5rem;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: rgba(127, 127, 127, 0.18);
        color: inherit;
        cursor: pointer;
      }
      .theme-toggle:hover {
        background: rgba(127, 127, 127, 0.3);
      }
      .theme-toggle svg {
        width: 1.15rem;
        height: 1.15rem;
      }
      .theme-toggle .icon-moon {
        display: none;
      }
      .theme-toggle.is-light .icon-sun {
        display: none;
      }
      .theme-toggle.is-light .icon-moon {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="title-row">
        <h1>goban-web</h1>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          title="Toggle color theme"
          aria-label="Toggle color theme"
        >
          <svg
            class="icon-sun"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4" />
            <line x1="12" y1="2" x2="12" y2="4.5" />
            <line x1="12" y1="19.5" x2="12" y2="22" />
            <line x1="2" y1="12" x2="4.5" y2="12" />
            <line x1="19.5" y1="12" x2="22" y2="12" />
            <line x1="4.9" y1="4.9" x2="6.6" y2="6.6" />
            <line x1="17.4" y1="17.4" x2="19.1" y2="19.1" />
            <line x1="4.9" y1="19.1" x2="6.6" y2="17.4" />
            <line x1="17.4" y1="6.6" x2="19.1" y2="4.9" />
          </svg>
          <svg
            class="icon-moon"
            viewBox="0 0 24 24"
            fill="currentColor"
            stroke="none"
          >
            <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" />
          </svg>
        </button>
      </div>
      <div class="size-row">
        <label for="width-slider">Board width</label>
        <input type="range" id="width-slider" min="240" max="800" step="10" value="480" />
        <output id="width-output" for="width-slider">480px</output>
      </div>
      <goban-wrapper id="goban-theme">
        <go-board-container>
          <go-metadata-container details="false"></go-metadata-container>
          <go-board
            id="board"
            theme="wgojs"
            sgf="/assets/ing_cup_rules_2.sgf"
            width="480"
            coordinates="none"
            coordinates-gap="15px"
            coordinates-font-size="10pt"
            padding="16px"
            corner-radius="8px"
            label-offset-y="-1.25"
            label-font="'Latin Modern Roman', serif"
            stone-size="1.0"
          ></go-board>
          <go-board-controls counter="false"></go-board-controls>
        </go-board-container>
      </goban-wrapper>
    </main>
    <script type="module" src="/src/main.ts"></script>
    <script type="module">
      const THEME_KEY = "goban-demo-theme"
      const root = document.documentElement
      const button = document.getElementById("theme-toggle")
      const gobanWrapper = document.getElementById("goban-theme")

      function applyTheme(theme) {
        if (theme === "light" || theme === "dark") {
          root.dataset.theme = theme
          gobanWrapper.setAttribute("color-scheme", theme)
        } else {
          delete root.dataset.theme
          gobanWrapper.removeAttribute("color-scheme")
        }
      }

      const stored = localStorage.getItem(THEME_KEY)
      if (stored === "light" || stored === "dark") applyTheme(stored)

      function currentTheme() {
        if (root.dataset.theme === "light" || root.dataset.theme === "dark")
          return root.dataset.theme
        return window.matchMedia("(prefers-color-scheme: light)").matches
          ? "light"
          : "dark"
      }

      function syncButton() {
        button.classList.toggle("is-light", currentTheme() === "light")
      }

      button.addEventListener("click", () => {
        const next = currentTheme() === "light" ? "dark" : "light"
        applyTheme(next)
        localStorage.setItem(THEME_KEY, next)
        syncButton()
      })

      syncButton()

      // Board width: <go-board width="..."> is a fixed length, not a
      // percentage, so it doesn't resize with the viewport on its own —
      // "max-width: 100%" (see the stylesheet above) is what caps it
      // back down on a narrow screen, same as it caps the slider's own
      // upper end. Height is never set directly: leaving it unset makes
      // go-board derive it from `width` at the board's own aspect ratio
      // (see "width"/"height" in Docs.md), so a non-square crop wouldn't
      // get stretched by this slider.
      const WIDTH_KEY = "goban-demo-width"
      const board = document.getElementById("board")
      const slider = document.getElementById("width-slider")
      const output = document.getElementById("width-output")

      function applyWidth(px) {
        board.setAttribute("width", `${px}px`)
        output.textContent = `${px}px`
      }

      const storedWidth = Number(localStorage.getItem(WIDTH_KEY))
      if (Number.isInteger(storedWidth) && storedWidth >= Number(slider.min) && storedWidth <= Number(slider.max)) {
        slider.value = String(storedWidth)
      }
      applyWidth(Number(slider.value))

      slider.addEventListener("input", () => {
        const px = Number(slider.value)
        applyWidth(px)
        localStorage.setItem(WIDTH_KEY, String(px))
      })
    </script>
  </body>
</html>
