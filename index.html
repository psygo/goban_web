<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goban-web demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2rem;
        background: #2b2b2b;
        color: #eee;
        font-family: system-ui, sans-serif;
        box-sizing: border-box;
      }
      main {
        width: min(640px, 90vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      go-board {
        border-radius: 4px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      /*
        <go-board-controls> ships default buttons, but it's a wrapper: any
        markup placed inside it replaces them entirely. Tag elements with
        data-go-action/data-go-counter and this component wires them up —
        the styling and layout below is entirely ours, not the library's.
      */
      .nav-controls {
        display: flex;
        align-items: center;
        gap: 0.375rem;
      }
      .nav-controls button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.25rem;
        height: 2.25rem;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: #3a3a3a;
        color: #eee;
        cursor: pointer;
      }
      .nav-controls button:hover:not([data-go-disabled]) {
        background: #4a4a4a;
      }
      .nav-controls button[data-go-disabled] {
        opacity: 0.3;
        cursor: default;
      }
      .nav-controls button[data-go-action="play-all"][data-go-playing] {
        background: #7a3a3a;
      }
      .nav-counter {
        margin-left: 0.375rem;
        font-variant-numeric: tabular-nums;
        color: #bbb;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>goban-web</h1>
      <go-board-container>
        <go-metadata-container></go-metadata-container>
        <go-board-controls>
          <div class="nav-controls">
            <button data-go-action="first" title="First move" aria-label="First move">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="6" y1="5" x2="6" y2="19" />
                <polyline points="18 6 10 12 18 18" />
              </svg>
            </button>
            <button data-go-action="back-10" title="Back 10 moves" aria-label="Back 10 moves">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 6 12 12 18 18" />
                <polyline points="11 6 5 12 11 18" />
              </svg>
            </button>
            <button data-go-action="previous" title="Previous move" aria-label="Previous move">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 6 9 12 15 18" />
              </svg>
            </button>
            <button data-go-action="play-all" title="Play all" aria-label="Play all">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="none">
                <polygon points="6 4 20 12 6 20" />
              </svg>
            </button>
            <button data-go-action="next" title="Next move" aria-label="Next move">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 6 15 12 9 18" />
              </svg>
            </button>
            <button data-go-action="forward-10" title="Forward 10 moves" aria-label="Forward 10 moves">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 6 12 12 6 18" />
                <polyline points="13 6 19 12 13 18" />
              </svg>
            </button>
            <button data-go-action="last" title="Last move" aria-label="Last move">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="5" x2="18" y2="19" />
                <polyline points="6 6 14 12 6 18" />
              </svg>
            </button>
            <span class="nav-counter" data-go-counter></span>
          </div>
        </go-board-controls>
        <go-board
          sgf="/assets/xu_wenyan_vs_risa_ueno_17_07_2026.sgf"
          black-stone="/assets/black-stone.svg"
          white-stone="/assets/white-stone.svg"
          background-image="/assets/board-background.svg"
          width="480"
          height="480"
        ></go-board>
      </go-board-container>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
