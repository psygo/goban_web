<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goban-web demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2rem;
        background: #2b2b2b;
        color: #eee;
        font-family: system-ui, sans-serif;
        box-sizing: border-box;
      }
      main {
        width: min(640px, 90vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      go-board {
        border-radius: 4px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>goban-web</h1>
      <go-board-container>
        <go-metadata-container></go-metadata-container>
        <go-board-controls></go-board-controls>
        <go-board
          sgf="/assets/xu_wenyan_vs_risa_ueno_17_07_2026.sgf"
          black-stone="/assets/black-stone.svg"
          white-stone="/assets/white-stone.svg"
          background-image="/assets/board-background.svg"
          width="480"
          height="480"
          coordinates="top left bottom right"
          coordinates-gap="15px"
          coordinates-font-size="10pt"
          padding="6px"
          x-start="10"
          x-end="19"
        ></go-board>
      </go-board-container>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
